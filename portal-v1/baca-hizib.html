<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NWDI Farid Jamil App</title>
  <!-- <link rel="icon" href="icons/logo.png" type="image/x-icon"> -->
  <style>
    /* Reset dasar */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f4f4;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 20px;
      background-color: #008c45; /* Hijau khas NWDI */
      color: white;
    }

    .container {
      max-width: 1000px;
      margin: 20px auto;
      padding: 0 15px;
      flex: 1;
    }

    /* Grid System */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
    }

    /* Pemusatan Vertikal dan Horizontal */
    .menu-item {
      background-color: white;
      border-radius: 10px;
      padding: 20px;
      height: 120px; /* Tinggi tetap agar terlihat seragam */
      text-align: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.2s, background-color 0.2s;

      /* Kunci utama rata tengah vertikal & horizontal */
      display: flex;
      align-items: center;     /* Rata tengah vertikal */
      justify-content: center; /* Rata tengah horizontal */
    }

    .menu-item:hover {
      transform: translateY(-5px);
      background-color: #e8f5e9;
    }

    .menu-item p {
      font-weight: bold;
      color: #333;
      margin: 0;
      line-height: 1.4;
    }

    footer {
      text-align: center;
      padding: 15px;
      background-color: #333;
      color: white;
      font-size: 0.9rem;
      margin-top: auto;
    }

    /* Responsif untuk layar kecil */
    @media (max-width: 480px) {
      .menu-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>

</head>
<body>
  <header>
    <!-- <img src="icons/logo.png" width=10% /> -->
    <br>
    <h1>NWDI Farid Jamil App</h1>
  </header>

  <main>
    <div class="container">
      <section class="post-grid">
        <!-- Menu Items -->
        <div class="menu-item" onclick="openMenu('index')">
          <!-- <img src="icons/hizib.png" alt="Beranda" /> -->
          <p>Beranda</p>
        </div>
        <br>
        <div class="post-item">
            <!-- <img src="icons/hizib.png" alt="Hizib" /> -->
            <p>Baca Hizib Nahdlatul Wathan</p>
            <iframe name="Hizib" src="../hizib-nwdi-lite/index.html" width="100%" height="700px"></iframe>
        </div>
      </section>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 NWDI Farid Jamil App | Dirancang oleh Farid Jamil Official</p>
  </footer>

  <script>
    function openMenu(menuName) {
      // alert("Menu dibuka: " + menuName);
      // Di sini kamu bisa arahkan ke halaman lain atau tampilkan konten dinamis
      window.location.href = menuName + ".html";
    }
  </script>
</body>
</html>
